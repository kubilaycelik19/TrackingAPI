services:
  # --- 1. DJANGO WEB SERVİSİ ---
  - type: web
    name: expense-django
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python manage.py create_superuser
    startCommand: gunicorn my_finance_project.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: expense-db
          property: connectionString
      # --- DÜZELTİLEN KISIM BAŞLANGIÇ ---
      # Hata veren 'fromService' bloğunu kaldırdık.
      # Render'da servisler isimleriyle çağrılabilir.
      # FastAPI servisine 'expense-ai-service' adını verdiğimiz için adresi bellidir:
      - key: AI_SERVICE_URL
        value: http://expense-ai-service:10000
      # --- DÜZELTİLEN KISIM BİTİŞ ---
      
      # Demo Kullanıcı Bilgileri
      - key: DJANGO_SUPERUSER_USERNAME
        value: "demo"
      - key: DJANGO_SUPERUSER_PASSWORD
        value: "demo123"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "demo@example.com"

  # --- FASTAPI (AI) SERVİSİ ---
  - type: web
    name: expense-ai-service
    runtime: docker
    dockerContext: ./ai_service
    dockerfilePath: ./ai_service/Dockerfile
    # Render PORT değişkenini otomatik atar. uvicorn'u 10000'e kilitlendi
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PORT
        value: 10000

databases:
  # --- POSTGRESQL VERİTABANI ---
  - name: expense-db
    databaseName: expense_db
    user: expense_user
    plan: free